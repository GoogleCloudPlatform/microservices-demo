services:
  redis-cart:
    image: redis:alpine
    restart: unless-stopped

  emailservice:
    image: emailservice:5096a85
    build:
      context: ./src/emailservice
    environment:
      PORT: "8080"
      DISABLE_PROFILER: "1"

  productcatalogservice:
    image: productcatalogservice:5096a85
    build:
      context: ./src/productcatalogservice
    environment:
      PORT: "3550"
      DISABLE_PROFILER: "1"

  recommendationservice:
    image: recommendationservice:5096a85
    build:
      context: ./src/recommendationservice
    environment:
      PORT: "8080"
      PRODUCT_CATALOG_SERVICE_ADDR: productcatalogservice:3550
      DISABLE_PROFILER: "1"
    depends_on: [productcatalogservice]

  paymentservice:
    image: paymentservice:5096a85
    build:
      context: ./src/paymentservice
    environment:
      PORT: "50051"
      DISABLE_PROFILER: "1"

  shippingservice:
    image: shippingservice:5096a85
    build:
      context: ./src/shippingservice
    environment:
      PORT: "50051"
      DISABLE_PROFILER: "1"

  currencyservice:
    image: currencyservice:5096a85
    build:
      context: ./src/currencyservice
    environment:
      PORT: "7000"
      DISABLE_PROFILER: "1"

  adservice:
    image: adservice:5096a85
    build:
      context: ./src/adservice
    environment:
      PORT: "9555"

  cartservice:
    # cartservice (.NET 10) is not built locally: the SDK Docker build
    # fails under Docker Desktop on Apple Silicon (MSB4184 in restore
    # under BuildKit; protoc SIGSEGV in publish under the classic
    # builder). Pull and tag the upstream v0.10.5 image before
    # `docker compose up -d` -- see WORKSHOP.md "First-time setup".
    image: cartservice:5096a85
    environment:
      PORT: "7070"
      REDIS_ADDR: redis-cart:6379
    depends_on: [redis-cart]

  checkoutservice:
    image: checkoutservice:5096a85
    build:
      context: ./src/checkoutservice
    environment:
      PORT: "5050"
      PRODUCT_CATALOG_SERVICE_ADDR: productcatalogservice:3550
      SHIPPING_SERVICE_ADDR: shippingservice:50051
      PAYMENT_SERVICE_ADDR: paymentservice:50051
      EMAIL_SERVICE_ADDR: emailservice:8080
      CURRENCY_SERVICE_ADDR: currencyservice:7000
      CART_SERVICE_ADDR: cartservice:7070
      DISABLE_PROFILER: "1"
    depends_on:
      [
        productcatalogservice,
        shippingservice,
        paymentservice,
        emailservice,
        currencyservice,
        cartservice,
      ]

  frontend:
    image: frontend:5096a85
    build:
      context: ./src/frontend
    environment:
      PORT: "8080"
      PRODUCT_CATALOG_SERVICE_ADDR: productcatalogservice:3550
      CURRENCY_SERVICE_ADDR: currencyservice:7000
      CART_SERVICE_ADDR: cartservice:7070
      RECOMMENDATION_SERVICE_ADDR: recommendationservice:8080
      SHIPPING_SERVICE_ADDR: shippingservice:50051
      CHECKOUT_SERVICE_ADDR: checkoutservice:5050
      AD_SERVICE_ADDR: adservice:9555
      SHOPPING_ASSISTANT_SERVICE_ADDR: shoppingassistantservice:80
      ENABLE_PROFILER: "0"
    ports:
      - "8080:8080"
    depends_on:
      [
        productcatalogservice,
        currencyservice,
        cartservice,
        recommendationservice,
        shippingservice,
        checkoutservice,
        adservice,
      ]
