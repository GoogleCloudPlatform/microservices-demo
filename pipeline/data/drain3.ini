[DRAIN]
# Depth of the parse tree.
# Higher = more specific templates, but slower and more memory.
depth = 4

# Similarity threshold (0-1).
# Higher = stricter matching, more templates created.
# Lower = more aggressive merging, fewer templates.
sim_th = 0.4

# Maximum number of children per internal node.
max_children = 100

# Maximum number of distinct templates to keep.
# Oldest templates are evicted when this limit is reached.
max_clusters = 2000

# Extra delimiters beyond whitespace (space-separated list of characters).
extra_delimiters = []

# Parametrize any token that looks like a numeric value.
parametrize_numeric_tokens = True

[MASKING]
# List of regex masking rules applied BEFORE template mining.
# Format: each rule is a JSON array ["name", "regex_pattern", "replacement"]
# Rules are applied in order.
masking_instructions =
    ["IP",      "(\\d{1,3}\\.){3}\\d{1,3}",                          "<IP>"],
    ["UUID",    "[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}", "<UUID>"],
    ["HEX",     "0x[0-9a-fA-F]+",                                    "<HEX>"],
    ["PORT",    ":\\d{2,5}\\b",                                       ":<PORT>"],
    ["URL",     "https?://[^\\s]+",                                   "<URL>"],
    ["PATH",    "/[a-zA-Z0-9._/-]{5,}",                               "<PATH>"],
    ["TRACE",   "[0-9a-f]{16,32}",                                    "<TRACE_ID>"],
    ["NUM",     "\\b\\d+(\\.\\d+)?\\b",                               "<NUM>"]

[SNAPSHOT]
# Drain3 persistence — saves/restores the template miner state so templates
# are stable across restarts and multiple collection runs.
snapshot_interval_update_cnt = 100
compress_state = False
