name: "Continuous Integration - Main/Release"

on:
  push:
    branches:
      - main
      - release/*
    paths-ignore:
      - "**/README.md"
      - "kustomize/**"
      - ".github/workflows/kustomize-build-ci.yaml"
      - "terraform/**"
      - ".github/workflows/terraform-validate-ci.yaml"
      - "helm-chart/**"
      - ".github/workflows/helm-chart-ci.yaml"

concurrency:
  group: ci-main-${{ github.ref }}
  cancel-in-progress: true

jobs:
  code-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "src/shippingservice/go.mod"

      - name: Go Unit Tests
        timeout-minutes: 10
        run: |
          set -e
          for SERVICE in "shippingservice" "productcatalogservice"; do
            echo "testing $SERVICE..."
            pushd "src/$SERVICE"
            go test ./...
            popd
          done

      - name: C# Unit Tests
        timeout-minutes: 10
        run: |
          dotnet test src/cartservice/