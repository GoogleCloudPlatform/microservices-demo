name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  AWS_REGION: us-east-1

jobs:
  build-and-push:
    name: Build, Scan and Push Docker Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ── frontend ─────────────────────────────────
      - name: Build frontend
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: docker build -t $REGISTRY/frontend:${{ github.sha }} ./src/frontend

      - name: Scan frontend with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/frontend:${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL
          ignore-unfixed: true

      - name: Push frontend
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: docker push $REGISTRY/frontend:${{ github.sha }}

      # ── productcatalogservice ─────────────────────
      - name: Build productcatalogservice
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: docker build -t $REGISTRY/productcatalogservice:${{ github.sha }} ./src/productcatalogservice

      - name: Scan productcatalogservice with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/productcatalogservice:${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL
          ignore-unfixed: true

      - name: Push productcatalogservice
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: docker push $REGISTRY/productcatalogservice:${{ github.sha }}

      # ── cartservice ───────────────────────────────
      - name: Build cartservice
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: docker build -t $REGISTRY/cartservice:${{ github.sha }} ./src/cartservice/src

      - name: Scan cartservice with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/cartservice:${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL
          ignore-unfixed: true

      - name: Push cartservice
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: docker push $REGISTRY/cartservice:${{ github.sha }}

      # ── currencyservice ───────────────────────────
      - name: Build currencyservice
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: docker build -t $REGISTRY/currencyservice:${{ github.sha }} ./src/currencyservice

      - name: Scan currencyservice with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/currencyservice:${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL
          ignore-unfixed: true

      - name: Push currencyservice
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: docker push $REGISTRY/currencyservice:${{ github.sha }}

      # ── paymentservice ────────────────────────────
      - name: Build paymentservice
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: docker build -t $REGISTRY/paymentservice:${{ github.sha }} ./src/paymentservice

      - name: Scan paymentservice with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/paymentservice:${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL
          ignore-unfixed: true

      - name: Push paymentservice
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: docker push $REGISTRY/paymentservice:${{ github.sha }}

      # ── shippingservice ───────────────────────────
      - name: Build shippingservice
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: docker build -t $REGISTRY/shippingservice:${{ github.sha }} ./src/shippingservice

      - name: Scan shippingservice with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/shippingservice:${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL
          ignore-unfixed: true

      - name: Push shippingservice
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: docker push $REGISTRY/shippingservice:${{ github.sha }}

      # ── emailservice ──────────────────────────────
      - name: Build emailservice
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: docker build -t $REGISTRY/emailservice:${{ github.sha }} ./src/emailservice

      - name: Scan emailservice with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/emailservice:${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL
          ignore-unfixed: true

      - name: Push emailservice
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: docker push $REGISTRY/emailservice:${{ github.sha }}

      # ── checkoutservice ───────────────────────────
      - name: Build checkoutservice
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: docker build -t $REGISTRY/checkoutservice:${{ github.sha }} ./src/checkoutservice

      - name: Scan checkoutservice with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/checkoutservice:${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL
          ignore-unfixed: true

      - name: Push checkoutservice
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: docker push $REGISTRY/checkoutservice:${{ github.sha }}

      # ── recommendationservice ─────────────────────
      - name: Build recommendationservice
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: docker build -t $REGISTRY/recommendationservice:${{ github.sha }} ./src/recommendationservice

      - name: Scan recommendationservice with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/recommendationservice:${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL
          ignore-unfixed: true

      - name: Push recommendationservice
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: docker push $REGISTRY/recommendationservice:${{ github.sha }}

      # ── adservice ─────────────────────────────────
      - name: Build adservice
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: docker build -t $REGISTRY/adservice:${{ github.sha }} ./src/adservice

      - name: Scan adservice with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/adservice:${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL
          ignore-unfixed: true

      - name: Push adservice
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: docker push $REGISTRY/adservice:${{ github.sha }}

      # ── loadgenerator ─────────────────────────────
      - name: Build loadgenerator
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: docker build -t $REGISTRY/loadgenerator:${{ github.sha }} ./src/loadgenerator

      - name: Scan loadgenerator with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/loadgenerator:${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL
          ignore-unfixed: true

      - name: Push loadgenerator
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: docker push $REGISTRY/loadgenerator:${{ github.sha }}

      # ── shoppingassistantservice ──────────────────
      - name: Build shoppingassistantservice
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: docker build -t $REGISTRY/shoppingassistantservice:${{ github.sha }} ./src/shoppingassistantservice

      - name: Scan shoppingassistantservice with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/shoppingassistantservice:${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL
          ignore-unfixed: true

      - name: Push shoppingassistantservice
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: docker push $REGISTRY/shoppingassistantservice:${{ github.sha }}


  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@7006c4492b2e0ee0f816d36501671557c97f5995 # v8.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}