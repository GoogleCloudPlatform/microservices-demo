name: Deploy Single Component
run-name: Deploy component ${{ inputs.component }} to ${{ inputs.namespace }} environment version ${{ inputs.image_tag }}
on:
  workflow_dispatch:
    inputs:
      component:
        description: 'Component to deploy (e.g., frontend, cartservice, checkoutservice, etc.)'
        required: true
        type: string
      namespace:
        description: 'Kubernetes namespace to deploy to'
        required: true
        default: 'default'
        type: string
      image_tag:
        description: 'Image tag/version (optional, e.g., 3188ba25daca3f57225805de62a5b61ee4263a1f or v0.10.4)'
        required: false
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  deploy-single:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_AUTENITIFICATION_KEY}}
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Get cluster credentials
        run: |
          gcloud container clusters get-credentials ${{ secrets.GKE_CLUSTER_NAME }} \
            --region ${{ secrets.GKE_REGION }} \
            --project ${{ secrets.GCP_PROJECT_ID }}

      - name: Deploy single component
        run: |
          kubectl apply -f kubernetes-manifests/${{ inputs.component }}.yaml -n ${{ inputs.namespace }}

      - name: Update image version
        if: ${{ inputs.image_tag != '' }}
        run: |
          echo "Updating image to ghcr.io/50-kinds-of-deployment/${{ inputs.component }}:${{ inputs.image_tag }}"
          kubectl set image deployment/${{ inputs.component }} \
            ${{ inputs.component }}=ghcr.io/50-kinds-of-deployment/${{ inputs.component }}:${{ inputs.image_tag }} \
            -n ${{ inputs.namespace }}

      - name: Verify deployment
        run: |
          echo "Verifying deployment of ${{ inputs.component }} in namespace ${{ inputs.namespace }}"
          kubectl rollout status deployment/${{ inputs.component }} -n ${{ inputs.namespace }} --timeout=5m || true
          kubectl get pods -n ${{ inputs.namespace }} -l app=${{ inputs.component }}
