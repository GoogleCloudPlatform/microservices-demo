name: Deploy paymentservice + emailservice (staging -> prod)

on:
  push:
    branches: ["main"]
    paths:
      - "src/paymentservice/**"
      - "src/emailservice/**"
      - ".github/workflows/deploy-payment-email.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  GCP_PROJECT_ID: phonic-cinema-488316-b5
  GKE_CLUSTER_NAME: online-boutique
  GKE_LOCATION: us-central1-b

  AR_LOCATION: us-central1
  AR_REPOSITORY: online-boutique

  IMAGE_TAG: ${{ github.sha }}

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [ "paymentservice", "emailservice" ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Auth to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Ensure Artifact Registry repository exists
        run: |
          gcloud artifacts repositories describe "${AR_REPOSITORY}" \
            --location="${AR_LOCATION}" \
            --project="${GCP_PROJECT_ID}" \
          || gcloud artifacts repositories create "${AR_REPOSITORY}" \
            --repository-format=docker \
            --location="${AR_LOCATION}" \
            --project="${GCP_PROJECT_ID}"

      - name: Configure docker to push to Artifact Registry
        run: |
          gcloud auth configure-docker "${AR_LOCATION}-docker.pkg.dev" --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./src/${{ matrix.service }}
          push: true
          tags: |
            ${{ env.AR_LOCATION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPOSITORY }}/${{ matrix.service }}:${{ env.IMAGE_TAG }}

  deploy_staging:
    runs-on: ubuntu-latest
    needs: build_and_push
    env:
      K8S_NAMESPACE: staging
    steps:
      - name: Auth to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER_NAME }}
          location: ${{ env.GKE_LOCATION }}
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Update images in staging
        run: |
          REGISTRY="${AR_LOCATION}-docker.pkg.dev/${GCP_PROJECT_ID}/${AR_REPOSITORY}"

          kubectl -n "${K8S_NAMESPACE}" set image deployment/paymentservice \
            server="${REGISTRY}/paymentservice:${IMAGE_TAG}"

          kubectl -n "${K8S_NAMESPACE}" set image deployment/emailservice \
            server="${REGISTRY}/emailservice:${IMAGE_TAG}"

          kubectl -n "${K8S_NAMESPACE}" rollout status deployment/paymentservice --timeout=240s
          kubectl -n "${K8S_NAMESPACE}" rollout status deployment/emailservice --timeout=240s

          kubectl -n "${K8S_NAMESPACE}" get pods -l app=paymentservice -o wide
          kubectl -n "${K8S_NAMESPACE}" get pods -l app=emailservice -o wide

  deploy_prod:
    runs-on: ubuntu-latest
    needs: deploy_staging
    env:
      K8S_NAMESPACE: prod
    steps:
      - name: Auth to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER_NAME }}
          location: ${{ env.GKE_LOCATION }}
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Update images in prod
        run: |
          REGISTRY="${AR_LOCATION}-docker.pkg.dev/${GCP_PROJECT_ID}/${AR_REPOSITORY}"

          kubectl -n "${K8S_NAMESPACE}" set image deployment/paymentservice \
            server="${REGISTRY}/paymentservice:${IMAGE_TAG}"

          kubectl -n "${K8S_NAMESPACE}" set image deployment/emailservice \
            server="${REGISTRY}/emailservice:${IMAGE_TAG}"

          kubectl -n "${K8S_NAMESPACE}" rollout status deployment/paymentservice --timeout=240s
          kubectl -n "${K8S_NAMESPACE}" rollout status deployment/emailservice --timeout=240s

          kubectl -n "${K8S_NAMESPACE}" get pods -l app=paymentservice -o wide
          kubectl -n "${K8S_NAMESPACE}" get pods -l app=emailservice -o wide