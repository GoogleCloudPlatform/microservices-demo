name: Build and Push to ACR

on:
  workflow_dispatch:

env:
  ACR_NAME: onlineboutiqueacr

jobs:
  build:
    name: Build and push images
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Login to ACR
        run: |
          echo "${{ secrets.ACR_PASSWORD }}" | docker login ${{ env.ACR_NAME }}.azurecr.io \
            --username ${{ secrets.ACR_USERNAME }} \
            --password-stdin

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.10.0

      - name: Install Skaffold
        run: |
          curl -Lo skaffold https://storage.googleapis.com/skaffold/releases/latest/skaffold-linux-amd64
          chmod +x skaffold && sudo mv skaffold /usr/local/bin

      - name: Build and push images
        run: skaffold build -p aks --default-repo=${{ env.ACR_NAME }}.azurecr.io --file-output=build-artifacts.json

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: build-artifacts.json
