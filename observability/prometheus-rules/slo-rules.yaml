apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: service-slo-rules
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  groups:
    # ---------------------------------------------------------------
    # Group 1: Per-service RED metrics recording rules
    # Tracks RPS, error rate, availability, P99/P95 latency
    # for each Online Boutique microservice
    # ---------------------------------------------------------------
    - name: service.slo.recording
      interval: 30s
      rules:
        # ===================== frontend =====================
        - record: slo:service_rps:rate5m
          expr: >-
            sum(rate(istio_requests_total{reporter="source", destination_workload="frontend"}[5m]))
          labels:
            service: frontend
        - record: slo:service_error_rate:ratio5m
          expr: >-
            sum(rate(istio_requests_total{reporter="source", destination_workload="frontend", response_code=~"5.."}[5m]))
            /
            sum(rate(istio_requests_total{reporter="source", destination_workload="frontend"}[5m]))
          labels:
            service: frontend
        - record: slo:service_availability:ratio5m
          expr: >-
            1 - (
              sum(rate(istio_requests_total{reporter="source", destination_workload="frontend", response_code=~"5.."}[5m]))
              /
              sum(rate(istio_requests_total{reporter="source", destination_workload="frontend"}[5m]))
            )
          labels:
            service: frontend
        - record: slo:service_latency_p99:seconds
          expr: >-
            histogram_quantile(0.99,
              sum(rate(istio_request_duration_milliseconds_bucket{reporter="source", destination_workload="frontend"}[5m])) by (le)
            ) / 1000
          labels:
            service: frontend
        - record: slo:service_latency_p95:seconds
          expr: >-
            histogram_quantile(0.95,
              sum(rate(istio_request_duration_milliseconds_bucket{reporter="source", destination_workload="frontend"}[5m])) by (le)
            ) / 1000
          labels:
            service: frontend

        # ===================== cartservice =====================
