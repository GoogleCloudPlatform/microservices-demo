    # ---------------------------------------------------------------
    # Group 2: Error budget tracking (99.9% SLO = 0.001 error budget)
    # 30-day rolling window: 30*24*60/5 = 8640 five-minute intervals
    # ---------------------------------------------------------------
    - name: service.slo.error_budget
      interval: 1m
      rules:
        - record: slo:service_error_budget_remaining:ratio
          expr: >-
            1 - (
              sum_over_time(slo:service_error_rate:ratio5m{service="frontend"}[30d])
              / 8640
            ) / 0.001
          labels:
            service: frontend
        - record: slo:service_error_budget_remaining:ratio
          expr: >-
            1 - (
              sum_over_time(slo:service_error_rate:ratio5m{service="cartservice"}[30d])
              / 8640
            ) / 0.001
          labels:
            service: cartservice
        - record: slo:service_error_budget_remaining:ratio
