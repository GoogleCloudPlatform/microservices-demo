apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: service-slo-alerts
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  groups:
    # ---------------------------------------------------------------
    # Burn-rate alerts (Google SRE model)
    # SLO target: 99.9% (error budget = 0.001)
    # Fast burn: 14.4x budget over 1h window, fires after 2m
    # Slow burn: 6x budget over 6h window, fires after 15m
    # ---------------------------------------------------------------
    - name: service.slo.burn_rate_alerts
      rules:
        # ===================== frontend =====================
        - alert: HighErrorBurnRate
          expr: >-
            sum(rate(istio_requests_total{reporter="source", destination_workload="frontend", response_code=~"5.."}[1h]))
            /
            sum(rate(istio_requests_total{reporter="source", destination_workload="frontend"}[1h]))
            > 14.4 * 0.001
          for: 2m
          labels:
            severity: critical
            service: frontend
          annotations:
            summary: "High error burn rate on frontend"
            description: "frontend is burning through its error budget at 14.4x the allowed rate."
        - alert: SlowErrorBurnRate
          expr: >-
            sum(rate(istio_requests_total{reporter="source", destination_workload="frontend", response_code=~"5.."}[6h]))
            /
            sum(rate(istio_requests_total{reporter="source", destination_workload="frontend"}[6h]))
            > 6 * 0.001
          for: 15m
          labels:
            severity: warning
            service: frontend
          annotations:
            summary: "Slow error burn rate on frontend"
            description: "frontend is burning through its error budget at 6x the allowed rate."

        # ===================== cartservice =====================
