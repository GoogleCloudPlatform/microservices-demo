    # ---------------------------------------------------------------
    # Latency SLO alerts
    # HighLatency (critical): P99 > 2s sustained for 5m
    # ElevatedLatency (warning): P95 > 1s sustained for 10m
    # ---------------------------------------------------------------
    - name: service.slo.latency_alerts
      rules:
        - alert: HighLatency
          expr: slo:service_latency_p99:seconds{service="frontend"} > 2
          for: 5m
          labels:
            severity: critical
            service: frontend
          annotations:
            summary: "High P99 latency on frontend"
            description: "frontend P99 latency has exceeded 2s for the last 5 minutes."
        - alert: ElevatedLatency
          expr: slo:service_latency_p95:seconds{service="frontend"} > 1
          for: 10m
          labels:
            severity: warning
            service: frontend
          annotations:
            summary: "Elevated P95 latency on frontend"
            description: "frontend P95 latency has exceeded 1s for the last 10 minutes."

        - alert: HighLatency
          expr: slo:service_latency_p99:seconds{service="cartservice"} > 2
