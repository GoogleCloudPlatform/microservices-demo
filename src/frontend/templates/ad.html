{{ define "text_ad" }}
<div class="container py-3 px-lg-5 py-lg-5">
    <aside role="complementary" aria-label="Advertisement">
        <strong aria-hidden="true">Ad</strong>
        <a href="{{$.baseUrl}}{{.ad.RedirectUrl}}"
           rel="nofollow noopener noreferrer"
           target="_blank"
           aria-label="Advertisement: {{ .ad.Text }}, opens in new tab">
            {{.ad.Text}}
        </a>
    </aside>
</div>
{{ end }}
