{{ define "recommendations" }}
<section class="recommendations" aria-label="Recommended products section">
    <div class="container">
        <div class="row">
            <div class="col-xl-10 offset-xl-1">

                <h2 id="recommendations-heading">You May Also Like</h2>

                <ul class="row" aria-labelledby="recommendations-heading"
                    style="list-style:none;padding:0;margin:0;">
                    {{ range .recommendations }}
                    <li class="col-md-3" aria-label="Recommended product: {{ .Name }}">
                        <div>
                            <a href="{{ $.baseUrl }}/product/{{.Id}}"
                               aria-label="View recommended product: {{ .Name }}">
                                <img src="{{ $.baseUrl }}{{.Picture}}"
                                     alt="Product image of {{ .Name }}" />
                            </a>
                            <div>
                                <h5>{{ .Name }}</h5>
                            </div>
                        </div>
                    </li>
                    {{ end }}
                </ul>

            </div>
        </div>
    </div>
</section>
{{ end }}
