{{ define "home" }}

{{ template "header" . }}

<div {{ with $.platform_css }} class="{{.}}" {{ end }}>
    <span class="platform-flag" aria-hidden="true">{{$.platform_name}}</span>
</div>

<main role="main" class="home" aria-label="Home page, product listing">

    <!-- Hero banner image for mobile -->
    <div class="home-mobile-hero-banner d-lg-none"
         role="img"
         aria-label="Online Boutique hero banner image"></div>

    <div class="container-fluid">
        <div class="row">

            <div class="col-12 col-lg-12 px-10-percent">

                <section class="row hot-products-row px-xl-6" aria-label="Hot products section">

                    <div class="col-12">
                        <h3 id="hot-products-heading">Hot Products</h3>
                    </div>

                    <ul class="row w-100" aria-labelledby="hot-products-heading"
                        style="list-style:none; padding:0; margin:0;">
                        {{ range $.products }}
                        <li class="col-md-4 hot-product-card"
                            aria-label="Product: {{ .Item.Name }}, price {{ renderMoney .Price }}">
                            <a href="{{ $.baseUrl }}/product/{{.Item.Id}}"
                               aria-label="View details for {{ .Item.Name }}, priced at {{ renderMoney .Price }}">
                                <img loading="lazy"
                                     src="{{ $.baseUrl }}{{.Item.Picture}}"
                                     alt="Product image of {{ .Item.Name }}" />
                                <div class="hot-product-card-img-overlay" aria-hidden="true"></div>
                            </a>
                            <div>
                                <div class="hot-product-card-name">{{ .Item.Name }}</div>
                                <div class="hot-product-card-price" aria-label="Price: {{ renderMoney .Price }}">
                                    {{ renderMoney .Price }}
                                </div>
                            </div>
                        </li>
                        {{ end }}
                    </ul>

                </section>

                <!-- Footer for larger screens -->
                <div class="row d-none d-lg-block home-desktop-footer-row">
                    <div class="col-12 p-0">
                        {{ template "footer" . }}
                    </div>
                </div>

            </div>
        </div>
    </div>

</main>

<!-- Footer for smaller screens -->
<div class="d-lg-none">
    {{ template "footer" . }}
</div>

{{ end }}
