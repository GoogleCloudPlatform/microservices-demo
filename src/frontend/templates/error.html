{{ define "error" }}
    {{ template "header" . }}

    <div {{ with $.platform_css }} class="{{.}}" {{ end }}>
        <span class="platform-flag" aria-hidden="true">{{$.platform_name}}</span>
    </div>

    <main role="main" aria-label="Error page">
        <div class="py-5">
            <div class="container bg-light py-3 px-lg-5 py-lg-5">

                <h1 role="alert" aria-live="assertive">Uh, oh!</h1>
                <p>Something has failed. Below are some details for debugging.</p>

                <p>
                    <strong>HTTP Status:</strong>
                    <span aria-label="HTTP status code {{ .status_code }}: {{ .status }}">
                        {{.status_code}} {{.status}}
                    </span>
                </p>

                <pre class="border border-danger p-3"
                     aria-label="Error details"
                     role="log"
                     style="white-space:pre-wrap;word-break:keep-all;">{{- .error -}}</pre>

            </div>
        </div>
    </main>

    {{ template "footer" . }}
{{ end }}
