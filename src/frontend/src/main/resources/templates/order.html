<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head}"></head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>

<div th:class="${platform_css}">
    <span class="platform-flag" aria-hidden="true" th:text="${platform_name}"></span>
</div>

<main role="main" class="order" aria-label="Order confirmation page">

    <section class="container order-complete-section" aria-label="Order complete details">

        <div class="row">
            <div class="col-12 text-center">
                <h3>Your order is complete!</h3>
            </div>
            <div class="col-12 text-center">
                <p>We've sent you a confirmation email.</p>
            </div>
        </div>

        <div class="row border-bottom-solid padding-y-24"
             th:aria-label="'Order confirmation number: ' + ${order.orderId}">
            <div class="col-6 pl-md-0">Confirmation #</div>
            <div class="col-6 pr-md-0 text-right" th:text="${order.orderId}"></div>
        </div>

        <div class="row border-bottom-solid padding-y-24"
             th:aria-label="'Shipping tracking number: ' + ${order.shippingTrackingId}">
            <div class="col-6 pl-md-0">Tracking #</div>
            <div class="col-6 pr-md-0 text-right" th:text="${order.shippingTrackingId}"></div>
        </div>

        <div class="row border-bottom-solid padding-y-24" aria-label="Items in this order" th:if="${order_items}">
            <div class="col-12 pl-md-0 pr-md-0">
                <ul aria-label="Ordered items" style="list-style:none;padding:0;margin:0;">
                <li class="row cart-summary-item-row" th:each="item : ${order_items}" th:aria-label="'Order item: ' + ${item.item.name}">
                    <div class="col-md-4 pl-md-0">
                        <img class="img-fluid"
                             th:alt="'Product image of ' + ${item.item.name}"
                             th:src="@{${item.item.picture}}" />
                    </div>
                    <div class="col-md-8 pr-md-0">
                        <div class="row">
                            <div class="col"><h4 th:text="${item.item.name}">Name</h4></div>
                        </div>
                        <div class="row">
                            <div class="col" th:aria-label="'Quantity: ' + ${item.quantity}">Quantity: <span th:text="${item.quantity}"></span></div>
                            <div class="col pr-md-0 text-right" th:aria-label="'Item subtotal: ' + ${moneyFormatter.renderMoney(item.price)}">
                                <strong th:text="${moneyFormatter.renderMoney(item.price)}">$0.00</strong>
                            </div>
                        </div>
                    </div>
                </li>
                </ul>
            </div>
        </div>

        <div class="row border-bottom-solid padding-y-24"
             th:aria-label="'Shipping cost: ' + ${moneyFormatter.renderMoney(order.shippingCost)}">
            <div class="col-6 pl-md-0">Shipping</div>
            <div class="col-6 pr-md-0 text-right" th:text="${moneyFormatter.renderMoney(order.shippingCost)}"></div>
        </div>

        <div class="row border-bottom-solid padding-y-24"
             role="status"
             th:if="${not #strings.isEmpty(coupon_code_used)}"
             th:aria-label="'Coupon discount applied: ' + ${coupon_code_used} + ', saving ' + ${moneyFormatter.renderMoney(discount_amount)}">
            <div class="col-6 pl-md-0" style="color:#28a745;">
                Coupon Discount
                <span aria-hidden="true" style="background-color:#d4edda;color:#155724;padding:2px 8px;border-radius:4px;font-size:0.82em;font-weight:bold;margin-left:6px;"
                      th:text="${coupon_code_used}"></span>
            </div>
            <div class="col-6 pr-md-0 text-right" style="color:#28a745;">
                - <span th:text="${moneyFormatter.renderMoney(discount_amount)}"></span>
            </div>
        </div>

        <div class="row padding-y-24"
             th:aria-label="'Total amount paid: ' + ${moneyFormatter.renderMoney(total_paid)}">
            <div class="col-6 pl-md-0">Total</div>
            <div class="col-6 pr-md-0 text-right" th:text="${moneyFormatter.renderMoney(total_paid)}"></div>
        </div>

        <div class="row">
            <div class="col-12 text-center">
                <a class="cymbal-button-primary"
                   th:href="@{/}"
                   role="button"
                   aria-label="Continue shopping, return to home page">
                    Continue Shopping
                </a>
            </div>
        </div>

    </section>

    <div th:if="${recommendations}" th:replace="~{fragments/recommendations :: recommendations}"></div>

</main>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
