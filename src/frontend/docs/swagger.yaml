basePath: /
host: localhost:8080
info:
  contact: {}
  description: Frontend service for Google Microservices Demo.
  title: Hipster Shop Frontend API
  version: "1.0"
paths:
  /:
    get:
      consumes:
      - application/json
      description: Displays the Hipster Shop home page with the list of available
        products.
      produces:
      - text/html
      responses:
        "200":
          description: Home page rendered successfully
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      summary: Home page
      tags:
      - Home
  /assistant:
    get:
      consumes:
      - application/json
      description: Renders the shopping assistant interface for interacting with the
        AI assistant.
      produces:
      - text/html
      responses:
        "200":
          description: Assistant page rendered successfully
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      summary: Display shopping assistant page
      tags:
      - Assistant
  /bot:
    post:
      consumes:
      - application/json
      description: Sends a user query to the shopping assistant and returns the generated
        response.
      parameters:
      - description: Chat request
        in: body
        name: request
        required: true
        schema:
          additionalProperties: true
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid request
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      summary: Chat with shopping assistant
      tags:
      - Assistant
  /cart:
    get:
      consumes:
      - application/json
      description: Retrieves and displays the current user's shopping cart, including
        cart items, quantities, prices, and total amount.
      parameters:
      - description: Coupon validation error message, set when redirected here from
          /cart/checkout
        in: query
        name: coupon_error
        type: string
      - description: Coupon code to pre-fill in the form, set when redirected here
          from /cart/checkout
        in: query
        name: coupon_code
        type: string
      produces:
      - text/html
      responses:
        "200":
          description: Cart page rendered successfully
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      summary: View shopping cart
      tags:
      - Cart
    post:
      consumes:
      - application/x-www-form-urlencoded
      description: Adds a product to the current shopping cart.
      parameters:
      - description: Product ID
        in: formData
        name: product_id
        required: true
        type: string
      - description: Quantity
        in: formData
        name: quantity
        required: true
        type: integer
      produces:
      - text/html
      responses:
        "302":
          description: Redirect to cart
        "422":
          description: Validation Error
        "500":
          description: Internal Server Error
      summary: Add product to cart
      tags:
      - Cart
  /cart/checkout:
    post:
      consumes:
      - application/x-www-form-urlencoded
      description: Processes the checkout form, validates the input, places the order
        using the Checkout gRPC service, and renders the order confirmation page.
      parameters:
      - description: Customer email
        in: formData
        name: email
        required: true
        type: string
      - description: Street address
        in: formData
        name: street_address
        required: true
        type: string
      - description: ZIP/Postal code
        in: formData
        name: zip_code
        required: true
        type: string
      - description: City
        in: formData
        name: city
        required: true
        type: string
      - description: State
        in: formData
        name: state
        required: true
        type: string
      - description: Country
        in: formData
        name: country
        required: true
        type: string
      - description: Credit card number
        in: formData
        name: credit_card_number
        required: true
        type: string
      - description: Credit card expiration month
        in: formData
        name: credit_card_expiration_month
        required: true
        type: integer
      - description: Credit card expiration year
        in: formData
        name: credit_card_expiration_year
        required: true
        type: integer
      - description: Credit card CVV
        in: formData
        name: credit_card_cvv
        required: true
        type: integer
      - description: Coupon code
        in: formData
        name: coupon_code
        type: string
      produces:
      - text/html
      responses:
        "200":
          description: Order placed successfully
          schema:
            type: string
        "302":
          description: Redirect to /cart with a coupon_error when the submitted coupon
            is unknown or below its minimum order amount
          schema:
            type: string
        "422":
          description: Validation Error
          schema:
            type: string
        "500":
          description: Internal server error
          schema:
            type: string
      summary: Place an order
      tags:
      - Checkout
  /cart/empty:
    post:
      consumes:
      - application/json
      description: Removes all items from the current user's shopping cart.
      produces:
      - text/html
      responses:
        "200":
          description: Cart emptied successfully
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      summary: Empty shopping cart
      tags:
      - Cart
  /logout:
    get:
      consumes:
      - application/json
      description: Logs out the current user by clearing the session and redirects
        to the home page.
      produces:
      - text/html
      responses:
        "302":
          description: Redirect to home page after logout
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      summary: Logout user
      tags:
      - Authentication
  /product-meta/{ids}:
    get:
      consumes:
      - application/json
      description: Returns product metadata for one or more product IDs.
      parameters:
      - description: Comma-separated product IDs
        in: path
        name: ids
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid product ID
          schema:
            type: string
        "404":
          description: Product not found
          schema:
            type: string
      summary: Get product metadata
      tags:
      - Product
  /product/{id}:
    get:
      consumes:
      - application/json
      description: Displays detailed information for a specific product.
      parameters:
      - description: Product ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - text/html
      responses:
        "200":
          description: Product page rendered successfully
          schema:
            type: string
        "404":
          description: Product not found
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      summary: View product details
      tags:
      - Product
  /setCurrency:
    post:
      consumes:
      - application/x-www-form-urlencoded
      description: Updates the user's preferred currency and refreshes the current
        session.
      parameters:
      - description: Currency code (e.g. USD, EUR, INR)
        in: formData
        name: currency_code
        required: true
        type: string
      produces:
      - text/html
      responses:
        "302":
          description: Redirect after updating currency
          schema:
            type: string
        "400":
          description: Invalid currency code
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      summary: Set preferred currency
      tags:
      - Currency
swagger: "2.0"
