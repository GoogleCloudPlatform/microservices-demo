apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aegis-dashboard
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/auth-type: basic
    nginx.ingress.kubernetes.io/auth-secret: aegis-dashboard-auth
    nginx.ingress.kubernetes.io/auth-realm: "AEGIS Dashboard"
spec:
  ingressClassName: nginx
  rules:
    - host: aegis.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: aegis-dashboard
                port:
                  number: 80
